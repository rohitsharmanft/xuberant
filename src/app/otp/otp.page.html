<ion-content class="otp-page" [fullscreen]="true">
  <div class="otp-screen">
    <div class="otp-hero">
      <img src="/assets/img/icon.png" alt="" />
    </div>

    <div class="otp-panel">
      <p class="otp-message">OTP has been sent to your mobile number</p>
      <p class="otp-phone">{{ phone }}</p>

      <form (ngSubmit)="submitForm()" novalidate class="otp-form">
        <div class="otp-digits" role="group" aria-label="One-time password digits">
          <ion-input
            #otp1
            class="otp-digit"
            type="tel"
            inputmode="numeric"
            maxlength="1"
            [(ngModel)]="otp.otp1"
            [ngModelOptions]="{standalone: true}"
            (keyup)="otpController($event, otp2, '')"
            aria-label="First digit">
          </ion-input>
          <ion-input
            #otp2
            class="otp-digit"
            type="tel"
            inputmode="numeric"
            maxlength="1"
            [(ngModel)]="otp.otp2"
            [ngModelOptions]="{standalone: true}"
            (keyup)="otpController($event, otp3, otp1)"
            aria-label="Second digit">
          </ion-input>
          <ion-input
            #otp3
            class="otp-digit"
            type="tel"
            inputmode="numeric"
            maxlength="1"
            [(ngModel)]="otp.otp3"
            [ngModelOptions]="{standalone: true}"
            (keyup)="otpController($event, otp4, otp2)"
            aria-label="Third digit">
          </ion-input>
          <ion-input
            #otp4
            class="otp-digit"
            type="tel"
            inputmode="numeric"
            maxlength="1"
            [(ngModel)]="otp.otp4"
            [ngModelOptions]="{standalone: true}"
            (keyup)="otpController($event, '', otp3)"
            aria-label="Fourth digit">
          </ion-input>
        </div>

        <ion-button type="submit" expand="block" class="otp-submit">
          Submit
        </ion-button>
      </form>
    </div>
  </div>
</ion-content>

<ion-content class="home-content" [fullscreen]="true">

  <ng-container *ngIf="logininfo == '' || logininfo == null; else loggedInView">
    <div class="login-screen">
      <div class="hero-illustration">
        <img src="/assets/img/icon.png" alt="" />
      </div>

      <div class="login-panel">
        <h1 class="login-title">Enter your mobile number</h1>
        <p class="login-subtext">Please confirm your country code and enter your phone number</p>

        <form (ngSubmit)="submitForm()" novalidate class="login-form">
          <div class="inputs-row">
            <div class="input-col input-col-code">
              <div class="field-stack">
                <ion-select
                  class="field-select"
                  [(ngModel)]="countryCode"
                  [ngModelOptions]="{standalone: true}"
                  interface="action-sheet"
                  [interfaceOptions]="{ header: 'Country code' }"
                  aria-label="Country code">
                  <ion-select-option *ngFor="let c of countryOptions" [value]="c.dial">{{ c.dial }}</ion-select-option>
                </ion-select>
                <div class="field-line field-line-muted"></div>
              </div>
            </div>

            <div class="input-col input-col-phone">
              <div class="field-stack field-stack-accent">
                <span class="field-label title-mobile-number">Mobile number</span>
                <ion-input
                  class="field-input"
                  [(ngModel)]="mobile"
                  [ngModelOptions]="{standalone: true}"
                  type="tel"
                  inputmode="numeric"
                  maxlength="10"
                  autocomplete="tel-national"
                  placeholder=""
                  aria-label="Mobile number">
                </ion-input>
                <div class="field-line field-line-accent"></div>
              </div>
            </div>
          </div>

          <ion-button type="submit" expand="block" class="continue-btn">
            Continue
          </ion-button>
        </form>
      </div>
    </div>
  </ng-container>

  <ng-template #loggedInView>
    <div class="logged-in-hero">
      <img src="/assets/img/icon.png" alt="" />
    </div>
  </ng-template>

</ion-content>
